name: Daily PM Ingest

on:
  schedule:
    # Daily at 12:00 UTC = 8:00 AM ET
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run cloud ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python ingest_cloud.py

      - name: Commit new notes and seen files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add notes/ seen/
          if git diff --cached --quiet; then
            echo "No new articles to commit"
          else
            git commit -m "ingest: $(date -u +%Y-%m-%d) daily article sync"
            git push
          fi
